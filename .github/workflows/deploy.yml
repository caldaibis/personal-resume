name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build site + generate PDF
        run: npm run build:pdf

      # Re-build so the generated public/resume.pdf is copied into dist.
      - name: Bundle PDF into output
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist

  # Vercel deploys automatically from its Git integration on push to main.
  # This workflow validates the build (and the PDF generation) on every PR.
